  name: Mirror to personal repo                                                                                                                                                                                      
  on:                          
    push:                                                                                                                                                                                                            
      branches: [main]                                         
                      
  jobs:
    mirror:
      runs-on: ubuntu-latest
      steps:                
        - uses: actions/checkout@v4
          with:                    
            fetch-depth: 0                                                                                                                                                                                           
        - name: Push to personal repo
          env:                                                                                                                                                                                                       
            PAT: ${{ secrets.PERSONAL_REPO_PAT}}              
          run: |                                 
            git remote add personal "https://x-access-token:${PAT}@github.com/MaksymDS/foreflow-site-clone.git"
            git push personal main --force         
